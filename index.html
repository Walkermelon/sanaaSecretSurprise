<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My time with Sanaa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- reusable lily illustration, referenced elsewhere via <use> -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="lily-icon" viewBox="0 0 100 100">
      <g fill="currentColor">
        <path d="M50 50 C40 30 40 8 50 0 C60 8 60 30 50 50 Z"/>
        <path d="M50 50 C40 30 40 8 50 0 C60 8 60 30 50 50 Z" transform="rotate(72 50 50)"/>
        <path d="M50 50 C40 30 40 8 50 0 C60 8 60 30 50 50 Z" transform="rotate(144 50 50)"/>
        <path d="M50 50 C40 30 40 8 50 0 C60 8 60 30 50 50 Z" transform="rotate(216 50 50)"/>
        <path d="M50 50 C40 30 40 8 50 0 C60 8 60 30 50 50 Z" transform="rotate(288 50 50)"/>
      </g>
      <circle cx="50" cy="50" r="4" fill="#e9b44c"/>
    </symbol>
  </svg>

  <!-- drifting background petals, purely decorative -->
  <div class="bg-petals" aria-hidden="true">
    <svg class="petal"><use href="#lily-icon"></use></svg>
    <svg class="petal"><use href="#lily-icon"></use></svg>
    <svg class="petal"><use href="#lily-icon"></use></svg>
    <svg class="petal"><use href="#lily-icon"></use></svg>
    <svg class="petal"><use href="#lily-icon"></use></svg>
    <svg class="petal"><use href="#lily-icon"></use></svg>
    <svg class="petal"><use href="#lily-icon"></use></svg>
  </div>

  <!-- ======================= MASTHEAD ======================= -->
  <header class="masthead">
    <p class="masthead-meta">
      <span id="mastheadDate">…</span>
      <span class="meta-sep">·</span>
      by Walker
    </p>
    <h1 class="masthead-title">My time with Sanaa</h1>
    <p class="masthead-tagline">A collection of memories with Sanaa</p>

    <nav class="masthead-nav" id="mastheadNav" aria-label="Sections">
      <!-- nav links for each article are generated by js/main.js;
           the final tab below is always last -->
      <button class="nav-link nav-link-final" data-page="ask">  <span class="nav-heart">♥</span></button>
    </nav>
  </header>

  <!-- ======================= PAGES ======================= -->
  <main id="pages">

    <!-- Article pages are rendered here by js/main.js from the
         `articles` array — that file is where all the writing lives. -->
    <div id="articlesContainer"></div>

    <!-- FINAL TAB: THE ASK -->
    <section class="page ask-page" data-page="ask">
      <div id="askStage" class="ask-stage">
        <p class="kicker reveal">one last thing</p>
        <h2 class="ask-headline reveal">SANAA!</h2>
        <div class="rule-fancy reveal" aria-hidden="true">
          <span class="rule-line"></span>
          <svg class="rule-lily"><use href="#lily-icon"></use></svg>
          <span class="rule-line"></span>
        </div>
        <p class="ask-question script reveal"> May I be your boyfriend?</p>
        <div class="ask-buttons reveal" id="askButtons">
          <button class="btn btn-yes" id="yesBtn">Yesss!!!</button>
          <button class="btn btn-no" id="noBtn">No</button>
        </div>
      </div>

      <div id="celebrateStage" class="celebrate-stage hidden">
        <p class="kicker">this calls for matcha</p>
        <h2 class="celebrate-title script">She said yes!</h2>
        <p class="celebrate-note">RAHHHHHHHHHHHHHHHHHHHHHHHHHHH</p>
        <div class="celebrate-hearts" aria-hidden="true">
          <span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span>
        </div>
      </div>
    </section>

  </main>

  <footer class="colophon">
    <span class="colophon-rule" aria-hidden="true"></span>
    <p>this is the bottom of the page, Sanaa</p>
  </footer>

  <canvas id="confettiCanvas"></canvas>

  <!-- BACKGROUND MUSIC: drop your song at assets/audio/song.mp3
       (or change the src below to match your file's name).
       It starts on her first click — browsers don't allow sound before
       that — and the floating ♪ button pauses/resumes it. -->
  <audio id="bgMusic" src="assets/audio/song.mp3" loop preload="auto"></audio>
  <button id="musicToggle" class="music-toggle paused" aria-label="Pause or play the music" title="music">♪</button>

  <script src="js/main.js"></script>
</body>
</html>
